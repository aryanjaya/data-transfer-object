name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.1, 8.2, 8.3]
        laravel: [8.*, 9.*, 10.*]
        dependency-version: [prefer-lowest, prefer-stable]
        exclude:
          - php: 8.2
            laravel: 8.*
          - php: 8.2
            laravel: 9.*
          - php: 8.3
            laravel: 8.*
          - php: 8.3
            laravel: 9.*
        include:
          - laravel: 8.*
            testbench: ^6.0
          - laravel: 9.*
            testbench: ^7.0
          - laravel: 10.*
            testbench: ^8.0

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.dependency-version }} - ${{ matrix.os }}

    steps:
      -   name: Checkout code
          uses: actions/checkout@v4

      -   name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: ${{ matrix.php }}
            extensions: mbstring, sqlite, pdo_sqlite, iconv
            coverage: pcov

      -   name: Setup problem matchers
          run: |
            echo "::add-matcher::${{ runner.tool_cache }}/php.json"
            echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      -   name: Install dependencies
          run: |
            composer require "illuminate/collections:${{ matrix.laravel }}" --no-interaction --no-update
            composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

      -   name: Execute tests
          run: |
            mkdir -p build/logs build/coverage
            vendor/bin/phpunit
